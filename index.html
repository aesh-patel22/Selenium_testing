<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Abstract Login</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: 'Segoe UI', sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(120deg,#fdfbfb,#ebedee);
overflow:hidden;
}

/* abstract blobs */

.blob{
position:absolute;
border-radius:50%;
filter:blur(70px);
opacity:0.7;
animation:float 10s infinite alternate;
}

.blob1{
width:350px;
height:350px;
background:#7cc6fe;
top:-100px;
left:-100px;
}

.blob2{
width:300px;
height:300px;
background:#fcb69f;
bottom:-120px;
right:-80px;
}

.blob3{
width:250px;
height:250px;
background:#a1ffce;
bottom:120px;
left:200px;
}

@keyframes float{
from{transform:translateY(0px)}
to{transform:translateY(40px)}
}

/* glass card */

.login-card{
width:360px;
padding:40px;
border-radius:15px;
background:rgba(255,255,255,0.6);
backdrop-filter:blur(15px);
box-shadow:0 10px 40px rgba(0,0,0,0.15);
position:relative;
z-index:2;
}

.login-card h2{
text-align:center;
margin-bottom:25px;
color:#333;
}

/* inputs */

.input-group{
margin-bottom:18px;
position:relative;
}

.input-group i{
position:absolute;
top:12px;
left:12px;
color:#666;
}

.input-group input{
width:100%;
padding:12px 12px 12px 38px;
border-radius:6px;
border:1px solid #ddd;
font-size:14px;
transition:0.3s;
}

.input-group input:focus{
border-color:#7cc6fe;
outline:none;
box-shadow:0 0 6px rgba(124,198,254,0.5);
}

/* button */

button{
width:100%;
padding:12px;
border:none;
border-radius:6px;
background:linear-gradient(135deg,#7cc6fe,#6a82fb);
color:white;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:translateY(-2px);
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

/* error */

#error-msg{
margin-top:10px;
font-size:13px;
text-align:center;
font-weight:500;
}

/* footer */

.footer{
margin-top:18px;
text-align:center;
font-size:14px;
color:#555;
}

.footer a{
text-decoration:none;
color:#6a82fb;
}

</style>
</head>

<body>

<div class="blob blob1"></div>
<div class="blob blob2"></div>
<div class="blob blob3"></div>

<div class="login-card">

<h2>Login</h2>

<form id="loginForm">

<div class="input-group">
<i class="fa fa-user"></i>
<input type="text" id="username" name="username" placeholder="Username">
</div>

<div class="input-group">
<i class="fa fa-lock"></i>
<input type="password" id="password" name="password" placeholder="Password">
</div>

<button id="loginBtn" type="submit">Sign In</button>

<p id="error-msg"></p>

</form>

<div class="footer">
New user? <a href="#">Create account</a>
</div>

</div>

<script>

    document.getElementById("loginForm").addEventListener("submit", function(e){
    
    e.preventDefault()
    
    let user = document.getElementById("username").value
    let pass = document.getElementById("password").value
    let msg = document.getElementById("error-msg")
    
    if(user === "testuser" && pass === "test123"){
        msg.style.color = "green"
        msg.innerText = "Login Successful"
    
        setTimeout(()=>{
            window.location.href="dashboard.html"
        },1000)
    }
    else{
        msg.style.color = "red"
        msg.innerText = "Invalid Username or Password"
    }
    
    })
    
    </script>

</body>
</html>
