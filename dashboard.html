<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:#f4f6fb;
}

/* sidebar */

.sidebar{
width:220px;
height:100vh;
background:#6a82fb;
color:white;
position:fixed;
padding:25px;
}

.sidebar h2{
margin-bottom:30px;
}

.sidebar ul{
list-style:none;
}

.sidebar ul li{
margin:15px 0;
cursor:pointer;
}

/* main */

.main{
margin-left:220px;
padding:30px;
}

.cards{
display:flex;
gap:20px;
margin-top:20px;
}

.card{
flex:1;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

.logout{
margin-top:30px;
padding:10px 15px;
background:#ff5c5c;
border:none;
color:white;
border-radius:6px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="sidebar">
<h2>Dashboard</h2>

<ul>
<li>Home</li>
<li>Profile</li>
<li>Settings</li>
<li>Reports</li>
</ul>

<button class="logout" onclick="logout()">Logout</button>

</div>

<div class="main">

<h1>Welcome to your Dashboard 👋</h1>
<p>This is your dashboard after login.</p>

<div class="cards">

<div class="card">
<h3>Users</h3>
<p>120</p>
</div>

<div class="card">
<h3>Sales</h3>
<p>$2,300</p>
</div>

<div class="card">
<h3>Orders</h3>
<p>58</p>
</div>

</div>

</div>

<script>

function logout(){
window.location.href="index.html"
}

</script>

</body>
</html>
